name: Deploy to Production

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  NODE_VERSION: '18'

jobs:
  # Backend Tests & Deploy
  backend:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run linting
        working-directory: ./backend
        run: npm run lint --if-present

      - name: Run tests
        working-directory: ./backend
        run: npm test --if-present
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: test_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: test-secret-key

      # Deploy to Railway
      - name: Deploy to Railway
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: railwayapp/deploy@v1
        with:
          railwayToken: ${{ secrets.RAILWAY_TOKEN }}
          railwayEnvironment: production

  # Frontend Build & Deploy
  frontend:
    runs-on: ubuntu-latest
    needs: backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run linting
        working-directory: ./frontend
        run: npm run lint --if-present

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.FRONTEND_API_URL }}
          REACT_APP_DEVICE_SERVER_URL: ${{ secrets.FRONTEND_DEVICE_SERVER_URL }}

      - name: Run tests
        working-directory: ./frontend
        run: npm test --if-present
        env:
          CI: true

      # Deploy to Vercel
      - name: Deploy to Vercel
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./frontend

  # Device Server Deploy
  device-server:
    runs-on: ubuntu-latest
    needs: backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: device-server/package-lock.json

      - name: Install dependencies
        working-directory: ./device-server
        run: npm ci

      - name: Run linting
        working-directory: ./device-server
        run: npm run lint --if-present

      # Deploy to Railway (optional - if using Railway for device server)
      - name: Deploy to Railway
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: railwayapp/deploy@v1
        with:
          railwayToken: ${{ secrets.RAILWAY_DEVICE_SERVER_TOKEN }}
          railwayEnvironment: production

  # Database Migrations
  migrate:
    runs-on: ubuntu-latest
    needs: backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run database migrations
        working-directory: ./backend
        run: npm run migrate
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
